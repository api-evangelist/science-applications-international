aid: science-applications-international
name: Science Applications International Corporation (SAIC)
description: >-
  Science Applications International Corporation (SAIC) is a leading American
  technology integrator providing full life cycle services and solutions in the
  technical, engineering, and enterprise information technology markets. Headquartered
  in Reston, Virginia, SAIC serves the U.S. federal government with approximately
  $7.4 billion in annual revenues. The company delivers IT modernization, cloud
  computing, digital transformation, cybersecurity, AI/ML, and data analytics
  solutions primarily for defense, intelligence, and civilian government customers.
  SAIC's open source presence is at github.com/saic-oss with DevSecOps tools
  including Anvil (CI/CD container) and terraform modules for Kubernetes sandboxes.
